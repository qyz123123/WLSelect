services:
  postgres:
    image: postgres:16-alpine
    container_name: wlselect-postgres
    environment:
      POSTGRES_DB: wlselect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - wlselect-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wlselect"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  wlselect-postgres-data:
